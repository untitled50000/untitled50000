      position: fixed;

<div class="container">

  <button class="button" id="joinBtn">JOIN</button>
</div>

<div class="status" id="status"></div>
<div class="footnote">$3.65 / year</div>

<script>
const supabaseUrl = "https://qaywmgmxrrokicxhtctc.supabase.co";
</script>
<script>
const REAL_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFheXdtZ214cnJva2ljeGh0Y3RjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODk5MzUsImV4cCI6MjA5MDY2NTkzNX0.cRBfsdSkNjV_93-_SREQkc0A3PGuk234NbEAg3EBgc0";
const supabaseClient = window.supabase.createClient(supabaseUrl, REAL_SUPABASE_ANON_KEY);
const statusEl = document.getElementById("status");
const joinBtn = document.getElementById("joinBtn");

function setStatus(message) {
  statusEl.textContent = message || "";
}

async function loadCounter() {
  try {
    const { data, error } = await supabaseClient
      .from("untitled50000_counter")
      .select("active_members")
      .single();

    if (error) throw error;

    document.getElementById("counter").textContent =
      (data?.active_members || 0) + " / 50,000";
  } catch (err) {
    document.getElementById("counter").textContent = "0 / 50,000";
  }
}

loadCounter();

joinBtn.onclick = async () => {
  const originalLabel = joinBtn.textContent;

  try {
    const email = prompt("enter your email");
    if (!email) return;

    joinBtn.disabled = true;
    joinBtn.textContent = "starting checkout...";
    setStatus("starting checkout...");

    const { data, error } = await supabaseClient.functions.invoke("checkout2", {
      body: { email }
    });

    if (error) {
      throw new Error(error.message || "failed to reach checkout");
    }

    if (!data || !data.url) {
      throw new Error("No checkout URL returned");
    }

    setStatus("redirecting...");
    window.location.assign(data.url);
  } catch (err) {
    const message = err && err.message ? err.message : "Failed to fetch";
    setStatus(message);
    alert(message);
    joinBtn.disabled = false;
    joinBtn.textContent = originalLabel;
  }
};
</script>
