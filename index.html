<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>untitled50000</title>
  <link rel="icon" href="/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #2b0000;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .title { font-size: 56px; margin-bottom: 10px; }
    .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 40px; }
    .counter { font-size: 20px; margin-bottom: 30px; }
    .button {
      border: 1px solid #f5f5f5;
      padding: 12px 28px;
      color: #f5f5f5;
      background: transparent;
      cursor: pointer;
    }
    .button:hover { background: #f5f5f5; color: #2b0000; }
  </style>
</head>
<body>

<div class="container">
  <div class="title">untitled50000</div>
  <div class="subtitle">opens at 50,000</div>
  <div class="counter" id="counter">... / 50,000</div>
  <button class="button" id="joinBtn">JOIN</button>
</div>

<script>
const supabaseUrl = "https://qaywmgmxrrokicxhtctc.supabase.co";
const supabaseClient = window.supabase.createClient(
  supabaseUrl,
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFheXdtZ214cnJva2ljeGh0Y3RjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODk5MzUsImV4cCI6MjA5MDY2NTkzNX0.cRBfsdSkNjV_93-_SREQkc0A3PGuk234NbEAg3EBgc0"
);

async function loadCounter() {
  try {
    const { data, error } = await supabaseClient
      .from("untitled50000_counter")
      .select("active_members")
      .single();

    if (error) throw error;

    document.getElementById("counter").textContent =
      (data?.active_members || 0) + " / 50,000";
  } catch (err) {
    document.getElementById("counter").textContent = "0 / 50,000";
    console.error(err);
  }
}

loadCounter();

document.getElementById("joinBtn").onclick = async () => {
  try {
    const email = prompt("enter your email");
    if (!email) return;

    const { data: member, error: memberError } = await supabaseClient
      .from("untitled50000_members")
      .upsert(
        {
          email,
          status: "started",
          payment_status: "pending",
          subscription_status: "pending",
          active: false,
          checkout_started_at: new Date().toISOString()
        },
        { onConflict: "email" }
      )
      .select("id")
      .single();

    if (memberError || !member?.id) {
      console.error("member upsert failed", memberError);
      alert(memberError?.message || "error saving member");
      return;
    }

    const res = await fetch(
      "https://qaywmgmxrrokicxhtctc.functions.supabase.co/create-checkout-session",
      {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email: email,
          member_id: member.id
        })
      }
    );

    const json = await res.json();

    if (!res.ok || !json?.url) {
      console.error("checkout session failed", json);
      alert(json?.error || "error starting checkout");
      return;
    }

    window.location.href = json.url;
  } catch (err) {
    console.error(err);
    alert("error starting checkout");
  }
};
</script>

</body>
</html>
