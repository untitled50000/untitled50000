<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>untitled50000</title>

  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=102">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png?v=102">
  <link rel="shortcut icon" href="favicon.png?v=102">
  <link rel="apple-touch-icon" href="favicon.png?v=102">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #2b0000;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 400;
    }

    .container {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .title {
      font-size: 56px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 40px;
    }

    .counter {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .button {
      border: 1px solid #f5f5f5;
      padding: 12px 28px;
      color: #f5f5f5;
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      transition: background 0.15s ease, color 0.15s ease, opacity 0.15s ease;
    }

    .button:hover {
      background: #f5f5f5;
      color: #2b0000;
    }

    .button:disabled {
      opacity: 0.65;
      cursor: default;
    }

    .timer {
      display: none;
      gap: 24px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 72px;
    }

    .number {
      font-size: 28px;
      line-height: 1;
      letter-spacing: 1px;
    }

    .label {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 8px;
      text-transform: lowercase;
    }

    .bottom-actions {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .title { font-size: 42px; }
      .subtitle { margin-bottom: 42px; }
      .timer { gap: 18px; }
      .unit { min-width: 62px; }
      .number { font-size: 24px; }
      .bottom-actions {
        width: calc(100% - 32px);
        gap: 10px;
      }
      .button {
        flex: 1 1 140px;
        padding: 12px 18px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="title">untitled50000</div>
  <div class="subtitle" id="subtitle">opens at 50,000</div>

  <div class="counter" id="counter">... / 50,000</div>

  <button class="button" id="mainJoinBtn" type="button" onclick="handleJoinClick()">JOIN</button>

  <div class="timer" id="timer">
    <div class="unit">
      <div class="number" id="days">00</div>
      <div class="label">days</div>
    </div>
    <div class="unit">
      <div class="number" id="hours">00</div>
      <div class="label">hours</div>
    </div>
    <div class="unit">
      <div class="number" id="minutes">00</div>
      <div class="label">minutes</div>
    </div>
    <div class="unit">
      <div class="number" id="seconds">00</div>
      <div class="label">seconds</div>
    </div>
  </div>
</div>

<div class="bottom-actions" id="bottomActions">
  <button class="button" id="bottomJoinBtn" type="button" onclick="handleJoinClick()">JOIN</button>
  <button class="button" id="shareBtn" type="button" onclick="handleShareClick()">SHARE</button>
</div>

<script>
const supabaseUrl = "https://qaywmgmxrrokicxhtctc.supabase.co";
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFheXdtZ214cnJva2ljeGh0Y3RjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODk5MzUsImV4cCI6MjA5MDY2NTkzNX0.cRBfsdSkNjV_93-_SREQkc0A3PGuk234NbEAg3EBgc0";

const supabaseClient = window.supabase.createClient(
  supabaseUrl,
  supabaseAnonKey
);

const THRESHOLD = 50000;
const COUNTDOWN_LENGTH_DAYS = 30;
const STATE_ROW_ID = 1;

const subtitleEl = document.getElementById("subtitle");
const counterEl = document.getElementById("counter");
const timerEl = document.getElementById("timer");
const bottomActionsEl = document.getElementById("bottomActions");
const mainJoinBtn = document.getElementById("mainJoinBtn");
const bottomJoinBtn = document.getElementById("bottomJoinBtn");
const shareBtn = document.getElementById("shareBtn");

let countdownInterval = null;
let countdownStartIso = null;

function setJoinButtonsDisabled(disabled, label) {
  [mainJoinBtn, bottomJoinBtn].forEach((btn) => {
    if (!btn) return;
    btn.disabled = disabled;
    if (label) btn.textContent = label;
    else btn.textContent = "JOIN";
  });
}

function formatNumber(value) {
  return value.toLocaleString("en-US");
}

function showCountdown(startIso) {
  countdownStartIso = startIso;

  subtitleEl.textContent = "the countdown has begun";
  counterEl.style.display = "none";
  mainJoinBtn.style.display = "none";
  timerEl.style.display = "flex";
  bottomActionsEl.style.display = "flex";

  updateTimer();

  if (countdownInterval) {
    clearInterval(countdownInterval);
  }

  countdownInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
  if (!countdownStartIso) return;

  const start = new Date(countdownStartIso);
  const end = new Date(start.getTime() + COUNTDOWN_LENGTH_DAYS * 24 * 60 * 60 * 1000);
  const diffMs = end - new Date();

  if (diffMs <= 0) {
    document.getElementById("days").textContent = "00";
    document.getElementById("hours").textContent = "00";
    document.getElementById("minutes").textContent = "00";
    document.getElementById("seconds").textContent = "00";
    return;
  }

  const totalSeconds = Math.floor(diffMs / 1000);
  const days = Math.floor(totalSeconds / 86400);
  const hours = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  document.getElementById("days").textContent = String(days).padStart(2, "0");
  document.getElementById("hours").textContent = String(hours).padStart(2, "0");
  document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
  document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
}

async function getSiteState() {
  const { data, error } = await supabaseClient
    .from("untitled50000_site_state")
    .select("id, countdown_started, countdown_start")
    .eq("id", STATE_ROW_ID)
    .maybeSingle();

  if (error) throw error;
  return data;
}

async function lockCountdownGlobally() {
  const nowIso = new Date().toISOString();

  const { data, error } = await supabaseClient
    .from("untitled50000_site_state")
    .upsert({
      id: STATE_ROW_ID,
      countdown_started: true,
      countdown_start: nowIso
    }, { onConflict: "id" })
    .select("countdown_start")
    .single();

  if (error) throw error;
  return data?.countdown_start || nowIso;
}

async function loadPageState() {
  try {
    const state = await getSiteState();

    if (state?.countdown_started && state?.countdown_start) {
      showCountdown(state.countdown_start);
      return;
    }

    const { data, error } = await supabaseClient
      .from("untitled50000_members")
      .select("quantity")
      .eq("payment_status", "paid")
      .eq("subscription_status", "active");

    if (error) throw error;

    const total = (data || []).reduce((sum, row) => sum + (row.quantity || 1), 0);
    counterEl.textContent = formatNumber(total) + " / " + formatNumber(THRESHOLD);

    if (total >= THRESHOLD) {
      const startIso = await lockCountdownGlobally();
      showCountdown(startIso);
    }
  } catch (err) {
    console.error("load state error", err);
    counterEl.textContent = "— / " + formatNumber(THRESHOLD);
  }
}

async function requestCheckout(email) {
  const res = await fetch("https://qaywmgmxrrokicxhtctc.functions.supabase.co/checkout2", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": supabaseAnonKey,
      "Authorization": `Bearer ${supabaseAnonKey}`
    },
    body: JSON.stringify({ email })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    throw new Error(data?.error || "Checkout failed");
  }
  if (!data?.url) {
    throw new Error("No checkout URL returned");
  }

  return data.url;
}

async function handleJoinClick() {
  try {
    const email = prompt("enter your email");
    if (!email || !email.includes("@")) return;

    setJoinButtonsDisabled(true, "connecting...");

    const url = await requestCheckout(email.trim());
    window.location.href = url;
  } catch (err) {
    setJoinButtonsDisabled(false);
    alert(err?.message || "Checkout failed");
    console.error("join error", err);
  }
}

async function handleShareClick() {
  const shareUrl = window.location.href;
  const shareText = "untitled50000";

  if (navigator.share) {
    try {
      await navigator.share({
        title: "untitled50000",
        text: shareText,
        url: shareUrl
      });
      return;
    } catch (err) {
      // fall through to clipboard
    }
  }

  try {
    await navigator.clipboard.writeText(shareUrl);
    const originalLabel = shareBtn.textContent;
    shareBtn.textContent = "copied";
    setTimeout(() => {
      shareBtn.textContent = originalLabel;
    }, 1200);
  } catch (err) {
    prompt("copy this link", shareUrl);
  }
}

window.handleJoinClick = handleJoinClick;
window.handleShareClick = handleShareClick;

loadPageState();
</script>

</body>
</html>
