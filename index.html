<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>untitled50000</title>

  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=102">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png?v=102">
  <link rel="shortcut icon" href="favicon.png?v=102">
  <link rel="apple-touch-icon" href="favicon.png?v=102">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #2b0000;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 400;
    }
    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .title { font-size: 56px; margin-bottom: 10px; }
    .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 40px; }
    .counter { font-size: 20px; margin-bottom: 30px; }
    .button {
      border: 1px solid #f5f5f5;
      padding: 12px 28px;
      color: #f5f5f5;
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-weight: 400;
    }
    .button:hover { background: #f5f5f5; color: #2b0000; }
    .button:disabled { cursor: default; }
    .footnote {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      opacity: 0.5;
      white-space: nowrap;
      pointer-events: none;
    }
    .status {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      opacity: 0.78;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="title">untitled50000</div>
  <div class="subtitle">opens at 50,000</div>
  <div class="counter" id="counter">... / 50,000</div>
  <button class="button" id="joinBtn" type="button" onclick="handleJoinClick()">JOIN</button>
</div>

<div class="status" id="status"></div>
<div class="footnote">$3.65 / year</div>

<script>
const supabaseUrl = "https://qaywmgmxrrokicxhtctc.supabase.co";
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFheXdtZ214cnJva2ljeGh0Y3RjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODk5MzUsImV4cCI6MjA5MDY2NTkzNX0.cRBfsdSkNjV_93-_SREQkc0A3PGuk234NbEAg3EBgc0";
const functionUrl = "https://qaywmgmxrrokicxhtctc.functions.supabase.co/checkout2?t=" + Date.now();
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

const statusEl = document.getElementById("status");
const joinBtn = document.getElementById("joinBtn");
const counterEl = document.getElementById("counter");

function setStatus(message) {
  statusEl.textContent = message || "";
}

async function loadCounter() {
  try {
    const { data, error } = await supabaseClient
      .from("untitled50000_counter")
      .select("active_members")
      .single();

    if (error) throw error;
    counterEl.textContent = (data?.active_members || 0) + " / 50,000";
  } catch (err) {
    counterEl.textContent = "0 / 50,000";
  }
}

loadCounter();

async function requestCheckout(email) {
  const res = await fetch(functionUrl, {
    method: "POST",
    mode: "cors",
    cache: "no-store",
    credentials: "omit",
    headers: {
      "Content-Type": "application/json",
      "apikey": supabaseAnonKey,
      "Authorization": "Bearer " + supabaseAnonKey
    },
    body: JSON.stringify({ email })
  });

  const text = await res.text();
  let data = null;

  try {
    data = text ? JSON.parse(text) : null;
  } catch (e) {
    throw new Error(text || ("checkout error " + res.status));
  }

  if (!res.ok) {
    throw new Error((data && (data.error || data.message)) || ("checkout error " + res.status));
  }

  if (!data || typeof data.url !== "string" || !/^https?:\/\//i.test(data.url)) {
    throw new Error("No checkout URL returned");
  }

  return data.url;
}

async function handleJoinClick() {
  const originalLabel = joinBtn.textContent;

  try {
    const email = prompt("enter your email");
    if (!email) return;

    joinBtn.disabled = true;
    joinBtn.textContent = "starting checkout...";
    setStatus("starting checkout...");

    const url = await requestCheckout(email.trim());

    setStatus("redirecting...");
    window.location.href = url;
  } catch (err) {
    const message = err && err.message ? err.message : "Failed to fetch";
    setStatus(message);
    alert(message);
    joinBtn.disabled = false;
    joinBtn.textContent = originalLabel;
  }
}

window.handleJoinClick = handleJoinClick;
joinBtn.addEventListener("click", handleJoinClick);
</script>

</body>
</html>
