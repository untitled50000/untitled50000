<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>untitled50000</title>
  <link rel="icon" href="/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #2b0000;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .title {
      font-size: 56px;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 40px;
    }

    .counter {
      font-size: 20px;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .button {
      display: inline-block;
      border: 1px solid #f5f5f5;
      padding: 12px 28px;
      text-decoration: none;
      color: #f5f5f5;
      font-size: 14px;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      cursor: pointer;
      background: transparent;
    }

    .button:hover {
      background: #f5f5f5;
      color: #2b0000;
    }

    .footnote {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      opacity: 0.5;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">untitled50000</div>
    <div class="subtitle">opens at 50,000</div>

    <div class="counter" id="counter">... / 50,000</div>

    <button class="button" id="joinBtn">JOIN</button>
  </div>

  <div class="footnote">$3.65 / year</div>

  <script>
    const supabaseUrl = "https://qaywmgmxrrokicxhtctc.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFheXdtZ214cnJva2ljeGh0Y3RjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODk5MzUsImV4cCI6MjA5MDY2NTkzNX0.cRBfsdSkNjV_93-_SREQkc0A3PGuk234NbEAg3EBgc0";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function loadCounter() {
      const counterEl = document.getElementById("counter");

      try {
        const { data, error } = await supabase
          .from("untitled50000_counter")
          .select("active_members")
          .single();

        if (error) throw error;

        counterEl.textContent = `${data.active_members} / 50,000`;
      } catch (err) {
        counterEl.textContent = `0 / 50,000`;
      }
    }

    loadCounter();

    document.getElementById("joinBtn").onclick = async () => {
      try {
        const email = prompt("enter your email");
        if (!email) return;

        const { data: member, error } = await supabase
          .from("untitled50000_members")
          .upsert(
            {
              email,
              status: "started",
              checkout_started_at: new Date().toISOString(),
            },
            { onConflict: "email" }
          )
          .select("id")
          .single();

        if (error) throw error;

        const res = await fetch("https://qaywmgmxrrokicxhtctc.functions.supabase.co/create-checkout-session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ memberId: member.id })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        window.location.href = data.url;

      } catch (err) {
        alert("error starting checkout");
        console.error(err);
      }
    };
  </script>

</body>
</html>
