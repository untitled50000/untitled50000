<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>untitled50000 — confirmed</title>
  <link rel="icon" href="favicon.png">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #2b0000;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
      opacity: 0;
      animation: fadeIn 1.4s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .button {
      border: 1px solid #f5f5f5;
      padding: 12px 24px;
      text-decoration: none;
      color: #f5f5f5;
      font-size: 12px;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .button:hover {
      background: #f5f5f5;
      color: #2b0000;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="subtitle">
      you’ll receive an email when untitled50000 opens.
    </div>

    <div class="button" onclick="shareLink()">share</div>
  </div>

  <script>
    function shareLink() {
      const url = "https://untitled50000.com";

      if (navigator.share) {
        navigator.share({
          title: "untitled50000",
          text: "opens at 50,000",
          url: url
        });
      } else {
        navigator.clipboard.writeText(url);
        alert("link copied");
      }
    }
  </script>

</body>
</html>
